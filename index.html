<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="color-scheme" content="light only"/>
  <meta name="description" content="Frederik Lenau — paintings"/>
  <meta property="og:site_name" content="Frederik Lenau"/>
  <meta property="og:title" content="Frederik Lenau"/>
  <meta property="og:type" content="website"/>
  <meta property="og:description" content="Frederik Lenau — paintings"/>
  <meta property="og:url" content="https://frederiklenau.dk"/>
  <meta property="og:image" content="https://frederiklenau.dk/images/is_it_that_season_of_the_year.png"/>
  <meta property="twitter:card" content="summary_large_image"/>
  <link rel="canonical" href="https://frederiklenau.dk"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000'/></svg>"/>
  <title>Frederik Lenau</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Frederik Lenau",
    "url": "https://frederiklenau.dk",
    "jobTitle": "Painter",
    "knowsAbout": "Painting",
    "sameAs": ["https://instagram.com/frederiklenau"]
  }
  </script>
</head>
<body>

  <!-- ── Home (3 words) ──────────────────────────────────── -->
  <div class="home-screen" id="home-screen">
    <div class="home-words">
      <button class="home-word" data-page="work">Work</button>
      <button class="home-word" data-page="about">About</button>
      <button class="home-word" data-page="contact">Contact</button>
    </div>
  </div>

  <!-- ── Overlay panels ──────────────────────────────────── -->
  <div class="panel" id="panel-work">
    <button class="panel-close" aria-label="Close">&larr;</button>
    <div class="panel-inner">
      <div class="gallery" id="gallery"></div>
    </div>
  </div>

  <div class="panel" id="panel-about">
    <button class="panel-close" aria-label="Close">&larr;</button>
    <div class="panel-inner">
      <div class="text-page">
        <div class="text-content">
          <p>Frederik Lenau is a Danish painter working with acrylic and oil on canvas. His work explores themes of memory, place, and the quiet tension between interior and exterior landscapes.</p>
          <p>Based in Denmark.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-contact">
    <button class="panel-close" aria-label="Close">&larr;</button>
    <div class="panel-inner">
      <div class="text-page">
        <div class="text-content">
          <p>For inquiries, reach out at <a href="mailto:frederik@lenau.dk">frederik@lenau.dk</a></p>
          <p><a href="https://instagram.com/frederiklenau" target="_blank" rel="noopener">Instagram</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Lightbox ────────────────────────────────────────── -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous">&larr;</button>
    <button class="lightbox-next" id="lightbox-next" aria-label="Next">&rarr;</button>
    <div class="lightbox-content">
      <div class="lightbox-spinner" id="lightbox-spinner"></div>
      <img src="" alt="" id="lightbox-img"/>
      <img src="" alt="" id="lightbox-img-back"/>
    </div>
    <div class="lightbox-counter" id="lightbox-counter"></div>
    <div class="lightbox-meta" id="lightbox-meta"></div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
